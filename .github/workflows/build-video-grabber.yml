name: Build video-grabber

on:
  push:
    branches: [main]
    paths:
      - "packages/tools/video-grabber/**"
  pull_request:
    paths:
      - "packages/tools/video-grabber/**"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: video_grabber_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    defaults:
      run:
        working-directory: packages/tools/video-grabber

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        env:
          TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/video_grabber_test
        run: pytest tests/ -v

      - name: Lint
        run: ruff check video_grabber/ tests/

  build:
    name: Build and push
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name != 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          context: packages/tools/video-grabber
          push: true
          tags: |
            ghcr.io/keeping-history/video-grabber:${{ github.sha }}
            ghcr.io/keeping-history/video-grabber:latest
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
