name: Build and publish images

# Builds the rt911 service images on GitHub-hosted runners (free, public repo)
# and pushes them to GHCR. Deployment is handled by Argo CD Image Updater via
# the Keeping-History/infra GitOps repo. No Google Cloud, no cluster creds here.
#
# Two images:
#   ghcr.io/keeping-history/rt911-streamer   (Go WebSocket service)
#   ghcr.io/keeping-history/rt911-frontend   (Vite SPA served by nginx)
#
# The frontend bakes its backend URLs in at build time (see FE_* env below).

on:
  push:
    branches: [main, v2.0.0a1]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  # Public backend URLs compiled into the frontend bundle.
  FE_VITE_PROXY_PROTOCOL: "https:"
  FE_VITE_PROXY_HOST: "timemachine.911realtime.org"
  FE_VITE_PROXY_PORT: "443"
  FE_VITE_MEDIA_STREAM_URL: "wss://stream-beta.911realtime.org/stream"
  FE_VITE_OPENREPLAY_PROJECT_KEY: "fsiCRmSeFQkdKxDDwD0C"
  FE_VITE_OPENREPLAY_INGEST_URL: "https://openreplay.911realtime.org/ingest"
  FE_VITE_FEEDBACK_URL: "https://stream-beta.911realtime.org"

jobs:
  # Type-check, lint and unit-test the frontend. The Docker image build only runs
  # `vite build` (transpile-only), so without this job tsc/eslint/vitest never run
  # in CI and can regress silently.
  frontend-checks:
    name: frontend-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check
        run: pnpm --filter @rt911/frontend exec tsc -b
      - name: Lint
        run: pnpm --filter @rt911/frontend exec eslint .
      - name: Test
        run: pnpm --filter @rt911/frontend run test

  streamer-test:
    name: streamer-test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/backend
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v5
        with:
          go-version-file: packages/backend/go.mod
          cache-dependency-path: packages/backend/go.sum
      - name: Test
        run: go test ./...

  streamer:
    needs: [streamer-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: packages/backend
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ghcr.io/keeping-history/rt911-streamer:${{ github.sha }}
            ghcr.io/keeping-history/rt911-streamer:${{ github.event_name == 'pull_request' && github.sha || github.ref_name }}
          cache-from: type=gha,scope=streamer
          cache-to: type=gha,mode=max,scope=streamer

  frontend:
    needs: frontend-checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: packages/frontend/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          build-args: |
            VITE_PROXY_PROTOCOL=${{ env.FE_VITE_PROXY_PROTOCOL }}
            VITE_PROXY_HOST=${{ env.FE_VITE_PROXY_HOST }}
            VITE_PROXY_PORT=${{ env.FE_VITE_PROXY_PORT }}
            VITE_MEDIA_STREAM_URL=${{ env.FE_VITE_MEDIA_STREAM_URL }}
            VITE_OPENREPLAY_PROJECT_KEY=${{ env.FE_VITE_OPENREPLAY_PROJECT_KEY }}
            VITE_OPENREPLAY_INGEST_URL=${{ env.FE_VITE_OPENREPLAY_INGEST_URL }}
            VITE_FEEDBACK_URL=${{ env.FE_VITE_FEEDBACK_URL }}
          tags: |
            ghcr.io/keeping-history/rt911-frontend:${{ github.sha }}
            ghcr.io/keeping-history/rt911-frontend:${{ github.event_name == 'pull_request' && github.sha || github.ref_name }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend

  e2e:
    needs: frontend-checks
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v7
      - uses: jdx/mise-action@v4
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Type-check E2E
        run: pnpm --filter @rt911/frontend exec tsc --project tsconfig.e2e.json --noEmit
      - name: Install Playwright browsers
        run: pnpm --filter @rt911/frontend exec playwright install --with-deps chromium
      - name: Run E2E tests
        run: pnpm --filter @rt911/frontend exec playwright test
      - name: Upload report artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: playwright-report
          path: packages/frontend/playwright-report/
          retention-days: 30
      - name: Post PR comment
        uses: actions/github-script@v7
        if: always() && github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            let body;
            try {
              const results = JSON.parse(
                fs.readFileSync('packages/frontend/playwright-report/results.json', 'utf8')
              );
              // Playwright JSON reporter uses `expected`/`unexpected`, not `passed`/`failed`
              const { expected, unexpected, flaky, skipped } = results.stats;
              const icon = unexpected > 0 ? '⚠️' : '✅';
              body = `${icon} **Playwright E2E** — ${expected} passed · ${unexpected} failed · ${flaky} flaky · ${skipped} skipped\n\n[Full report](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            } catch (e) {
              body = `⚠️ **Playwright E2E** — results unavailable (dev server failed to start or tests crashed before writing output)\n\n[Run logs](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId})`;
            }
            await github.rest.issues.createComment({
              ...context.repo, issue_number: context.issue.number, body
            });
