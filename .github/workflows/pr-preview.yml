name: PR Preview

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
      - closed
      - converted_to_draft

jobs:
  deploy:
    name: Deploy preview environment
    if: >
      github.event.action != 'closed' &&
      github.event.action != 'converted_to_draft' &&
      !github.event.pull_request.draft
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # --- GCP Authentication (Workload Identity Federation) ---
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      # --- Backend: Docker build and push ---
      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ secrets.GCP_REGION }}-docker.pkg.dev --quiet

      - name: Build and push backend image
        env:
          IMAGE: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}/backend:pr-${{ github.event.pull_request.number }}
        run: |
          docker build -t "$IMAGE" packages/backend
          docker push "$IMAGE"

      # --- Backend: Deploy to Cloud Run ---
      # Security note: --allow-unauthenticated is intentional for PR preview environments.
      # The backend connects to a shared staging database. This is an accepted trade-off:
      # staging data is not sensitive, and SECRET must be a preview-specific value
      # (never shared with production).
      - name: Deploy backend to Cloud Run
        id: deploy-backend
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: rt911-pr-${{ github.event.pull_request.number }}
          image: ${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}/backend:pr-${{ github.event.pull_request.number }}
          region: ${{ secrets.GCP_REGION }}
          flags: --allow-unauthenticated --port=8080 --min-instances=0 --max-instances=1 --add-cloudsql-instances=civil-clarity-280121:us-central1:rt911-backend-db
          env_vars: |
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            REDIS_URL=${{ secrets.REDIS_URL }}
            SECRET=${{ secrets.SECRET }}

      # --- Directus: Deploy to Cloud Run ---
      - name: Deploy Directus to Cloud Run
        id: deploy-directus
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: rt911-directus-pr-${{ github.event.pull_request.number }}
          image: directus/directus:latest
          region: ${{ secrets.GCP_REGION }}
          flags: --allow-unauthenticated --port=8055 --min-instances=0 --max-instances=1 --add-cloudsql-instances=civil-clarity-280121:us-central1:rt911-backend-db
          env_vars: |
            SECRET=${{ secrets.SECRET }}
            DB_CLIENT=pg
            DB_HOST=/cloudsql/civil-clarity-280121:us-central1:rt911-backend-db
            DB_PORT=5432
            DB_DATABASE=rt911-backend-db
            DB_USER=rt911
            DB_PASSWORD=${{ secrets.DB_PASSWORD }}
            ADMIN_EMAIL=${{ secrets.DIRECTUS_ADMIN_EMAIL }}
            ADMIN_PASSWORD=${{ secrets.DIRECTUS_ADMIN_PASSWORD }}

      # --- Seed: Wait for Directus, then seed schema + data ---
      - name: Set up Node for seed
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Wait for Directus to be healthy
        run: |
          URL="${{ steps.deploy-directus.outputs.url }}/server/health"
          for i in $(seq 1 30); do
            STATUS=$(curl -sf "$URL" | python3 -c "import sys,json; print(json.load(sys.stdin).get('status',''))" 2>/dev/null || true)
            if [ "$STATUS" = "ok" ]; then
              echo "Directus is healthy."
              exit 0
            fi
            echo "Waiting for Directus... ($i/30)"
            sleep 10
          done
          echo "Directus did not become healthy in time."
          exit 1

      - name: Install Cloud SQL proxy and psql client
        run: |
          curl -fsSL https://storage.googleapis.com/cloud-sql-connectors/cloud-sql-proxy/v2.14.2/cloud-sql-proxy.linux.amd64 -o cloud-sql-proxy
          chmod +x cloud-sql-proxy
          sudo apt-get install -y postgresql-client

      - name: Start Cloud SQL proxy
        run: |
          ./cloud-sql-proxy --port=5433 civil-clarity-280121:us-central1:rt911-backend-db &
          sleep 5

      - name: Seed database
        env:
          DIRECTUS_URL: ${{ steps.deploy-directus.outputs.url }}
          ADMIN_EMAIL: ${{ secrets.DIRECTUS_ADMIN_EMAIL }}
          ADMIN_PASSWORD: ${{ secrets.DIRECTUS_ADMIN_PASSWORD }}
          PSQL_URL: postgres://rt911:${{ secrets.DB_PASSWORD }}@127.0.0.1:5433/rt911-backend-db
        run: node packages/backend/seed.mjs

      # --- Frontend: Build with backend URL baked in ---
      - name: Derive WebSocket URL from Cloud Run URL
        id: wss
        run: |
          # Cloud Run outputs https://... — convert to wss://...host/stream
          BACKEND_URL="${{ steps.deploy-backend.outputs.url }}"
          WSS_URL="wss://${BACKEND_URL#https://}/stream"
          echo "url=$WSS_URL" >> "$GITHUB_OUTPUT"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '25'

      - name: Install dependencies
        run: pnpm install

      - name: Build frontend
        env:
          VITE_MEDIA_STREAM_URL: ${{ steps.wss.outputs.url }}
          VITE_PROXY_HOST: time-machine-proxy-723408812472.us-central1.run.app
          VITE_PROXY_PORT: 80
        run: pnpm --filter ./packages/frontend build

      # --- Frontend: Deploy to GCS ---
      - name: Create GCS bucket (idempotent)
        env:
          BUCKET: rt911-pr-${{ github.event.pull_request.number }}
        run: |
          gsutil mb \
            -p "${{ secrets.GCP_PROJECT_ID }}" \
            -l "${{ secrets.GCP_REGION }}" \
            "gs://$BUCKET" 2>/dev/null || true
          gsutil iam ch allUsers:objectViewer "gs://$BUCKET"
          gsutil web set -m index.html -e index.html "gs://$BUCKET"

      - name: Upload frontend to GCS
        env:
          BUCKET: rt911-pr-${{ github.event.pull_request.number }}
        run: |
          gsutil -m rsync -r -d packages/frontend/dist/ "gs://$BUCKET/"

      # --- Notify: Post/update PR comment ---
      - name: Post preview URLs as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const pr = context.payload.pull_request.number;
            const frontendUrl = `http://rt911-pr-${pr}.storage.googleapis.com/`;
            const backendUrl = `${{ steps.deploy-backend.outputs.url }}`;
            const marker = '<!-- pr-preview -->';
            const body = [
              marker,
              '## Preview Environment',
              '',
              '| Service | URL |',
              '|---|---|',
              `| Frontend | [${frontendUrl}](${frontendUrl}) |`,
              `| Backend | [${backendUrl}](${backendUrl}) |`,
              '',
              `*Last deployed: ${new Date().toUTCString()}*`,
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: pr,
            });

            const existing = comments.find(c => c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: pr,
                body,
              });
            }

  teardown:
    name: Destroy preview environment
    if: >
      github.event.action == 'closed' ||
      github.event.action == 'converted_to_draft'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Delete Cloud Run services
        run: |
          gcloud run services delete "rt911-pr-${{ github.event.pull_request.number }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --quiet 2>/dev/null || true
          gcloud run services delete "rt911-directus-pr-${{ github.event.pull_request.number }}" \
            --region="${{ secrets.GCP_REGION }}" \
            --quiet 2>/dev/null || true

      - name: Delete backend Docker image
        run: |
          gcloud artifacts docker images delete \
            "${{ secrets.GCP_REGION }}-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/${{ secrets.ARTIFACT_REGISTRY_REPO }}/backend:pr-${{ github.event.pull_request.number }}" \
            --delete-tags \
            --quiet 2>/dev/null || true

      - name: Delete GCS bucket
        run: |
          gsutil rm -r "gs://rt911-pr-${{ github.event.pull_request.number }}" 2>/dev/null || true
