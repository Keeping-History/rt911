[project]
name = "flight-recon"
version = "0.2.1"
description = "Reconstruct per-flight trajectories from BTS On-Time data and load them into Directus (Prefect flow)"
requires-python = ">=3.12"
dependencies = [
    "pandas>=2.0",
    "numpy>=1.26",
    "matplotlib>=3.8",
    "prefect>=3.7,<4",
    "prefect-kubernetes>=0.5",
    "httpx>=0.27",
    "psycopg[binary]>=3.1",
]

[project.optional-dependencies]
dev = ["pytest>=8", "ruff>=0.4"]

[build-system]
requires = ["setuptools>=68"]
build-backend = "setuptools.build_meta"

[tool.setuptools]
packages = ["flight_recon"]
py-modules = ["reconstruct"]

[tool.ruff]
line-length = 100
