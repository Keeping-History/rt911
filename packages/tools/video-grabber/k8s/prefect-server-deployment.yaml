apiVersion: apps/v1
kind: Deployment
metadata:
  name: prefect-server
  namespace: video-grabber
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prefect-server
  template:
    metadata:
      labels:
        app: prefect-server
    spec:
      containers:
        - name: prefect-server
          image: prefecthq/prefect:3-latest
          command: ["prefect", "server", "start", "--host", "0.0.0.0", "--port", "4200"]
          ports:
            - containerPort: 4200
          env:
            - name: PREFECT_API_DATABASE_CONNECTION_URL
              valueFrom:
                secretKeyRef:
                  name: video-grabber-secrets
                  key: PREFECT_API_DATABASE_CONNECTION_URL
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4200
            initialDelaySeconds: 10
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: prefect-server
  namespace: video-grabber
spec:
  selector:
    app: prefect-server
  ports:
    - port: 4200
      targetPort: 4200
