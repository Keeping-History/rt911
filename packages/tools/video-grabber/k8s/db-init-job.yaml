apiVersion: batch/v1
kind: Job
metadata:
  name: db-init
  namespace: video-grabber
  annotations:
    argocd.argoproj.io/hook: PreSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  template:
    spec:
      restartPolicy: OnFailure
      containers:
        - name: db-init
          image: postgres:16-alpine
          command:
            - sh
            - -c
            - |
              psql "$POSTGRES_URL" -c "CREATE DATABASE video_grabber;" || true
              psql "$POSTGRES_URL" -c "CREATE DATABASE prefect;" || true
          env:
            - name: POSTGRES_URL
              valueFrom:
                secretKeyRef:
                  name: postgres-secrets
                  key: DATABASE_URL
