[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "video-grabber"
version = "0.1.0"
description = "IA broadcast archive → HLS pipeline for 9/11 TV recordings"
requires-python = ">=3.12"
dependencies = [
    "alembic>=1.13",
    "sqlalchemy>=2.0",
    "psycopg2-binary>=2.9",
    "internetarchive>=4.1",
    "httpx>=0.27",
    "boto3>=1.36",
    "tenacity>=8.2",
    "prefect>=3.0",
    "prefect-kubernetes>=0.4",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.23",
    "moto[s3]>=5.0",
    "respx>=0.21",
    "ruff>=0.4",
    "black>=24.0",
]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.black]
line-length = 100
target-version = ["py312"]
