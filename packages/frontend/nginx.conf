server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;

    # COOP/COEP so the Infinite Mac emulator's SharedArrayBuffer works
    # (mirrors the headers the Vite dev server sets in vite.config.ts).
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "credentialless" always;

    # Hashed Vite assets are immutable — cache hard.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # index.html must NOT be cached: it points at hashed asset filenames that
    # change every build, so a stale cached index.html 404s on its old bundle.
    # no-store keeps Cloudflare/browsers from holding onto it across deploys.
    location = /index.html {
        add_header Cache-Control "no-store, must-revalidate";
    }

    # SPA: serve index.html for any client-side route.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
